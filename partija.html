<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bela — brojač partije</title>
<link rel="stylesheet" href="partija.css">
</head>
<body>

<header>
  <h1>🃏 Bela — brojač partije</h1>
  <a id="backLink" href="index.html">← natrag na turnir</a>
</header>

<main>
  <div class="card setup" id="setupCard" style="display:none;">
    <label>Ekipa A</label>
    <input type="text" id="teamAInput" placeholder="Ekipa A">
    <label>Ekipa B</label>
    <input type="text" id="teamBInput" placeholder="Ekipa B">
    <label>Partija do</label>
    <select id="targetInput">
      <option value="1501">1501</option>
      <option value="1001">1001</option>
      <option value="701">701</option>
    </select>
  </div>

  <div class="card">
    <div class="scoreboard">
      <div>
        <div class="tn" id="sbNameA">Ekipa A</div>
        <div class="pts" id="sbPtsA">0</div>
      </div>
      <div class="sep">:</div>
      <div>
        <div class="tn" id="sbNameB">Ekipa B</div>
        <div class="pts" id="sbPtsB">0</div>
      </div>
    </div>
    <div class="target-note" id="targetNote">do 1501</div>
    <div class="winner-banner" id="winnerBanner" style="display:none;"></div>
    <div class="sync-status" id="syncStatus"></div>
  </div>

  <div id="deals"></div>
</main>

<div class="footer-bar">
  <div class="inner">
    <button class="btn gold" id="addDealBtn">+ Novo dijeljenje</button>
    <button class="btn" id="unlockBtn" style="display:none;">🔒 Otključaj za upis</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="sync.js"></script>
<script src="bela.js"></script>
<script src="view.js"></script>
<script>
const params = new URLSearchParams(location.search);
const TURNIR = params.get('turnir');
const KOLO   = params.get('kolo');   // index kola (0-based)
const STOL   = params.get('stol');   // index utakmice u kolu (0-based)
const linked = TURNIR !== null && KOLO !== null && STOL !== null && BelaSync.configured();

const KEY = 'efd-bela-partija-' + (TURNIR || 'local') + '-' + (KOLO ?? 'x') + '-' + (STOL ?? 'x');

function emptyDeal() {
  return { caller: null, trick0: '', trick1: '', zvanja0: 0, zvanja1: 0, zv0: [], zv1: [],
           zvanjaWinner: null, bela0: false, bela1: false, kapot: null };
}

let st = load();
function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { teamA: 'Ekipa A', teamB: 'Ekipa B', target: 1501, deals: [emptyDeal()] };
}
function save() { localStorage.setItem(KEY, JSON.stringify(st)); }

let lastWritten = null;

let roundLocked = false;

function matchFinished(m) {
  return m && m.s1 != null && m.s2 != null && m.s1 !== m.s2 && m.fin !== false;
}
function isRoundDone(round) {
  return Array.isArray(round) && round.length > 0 && round.every(matchFinished);
}

function applyTournament(t) {
  const status = document.getElementById('syncStatus');
  if (!t) { status.textContent = 'Turnir nije pronađen — provjeri vezu.'; return; }
  const r = Number(KOLO), m = Number(STOL);
  const match = t.rounds && t.rounds[r] && t.rounds[r][m];
  if (!match) { status.textContent = 'Utakmica nije pronađena.'; return; }
  const name = i => (t.teams && t.teams[i] && t.teams[i].trim()) ? t.teams[i].trim() : ('Ekipa ' + (i + 1));
  const a = name(match.t1), b = name(match.t2), tgt = t.target || 1501;
  // zaključaj kad je kolo gotovo (svi stolovi završili) ili je krenulo kasnije kolo
  const laterRound = Array.isArray(t.rounds) && r < t.rounds.length - 1;
  const locked = laterRound || isRoundDone(t.rounds && t.rounds[r]);
  if (a === st.teamA && b === st.teamB && tgt === st.target && locked === roundLocked) return;
  st.teamA = a; st.teamB = b; st.target = tgt; roundLocked = locked;
  save();
  render();
}

function setupHeaderFromTournament() {
  if (!linked) {
    document.getElementById('setupCard').style.display = '';
    document.getElementById('teamAInput').value = st.teamA;
    document.getElementById('teamBInput').value = st.teamB;
    document.getElementById('targetInput').value = st.target;
    document.getElementById('backLink').style.display = 'none';
    return;
  }
  // prati turnir uživo: nazivi, granica i je li kolo zaključano
  BelaSync.watch(TURNIR, applyTournament);
}

document.getElementById('teamAInput')?.addEventListener('input', e => { st.teamA = e.target.value; save(); render(); });
document.getElementById('teamBInput')?.addEventListener('input', e => { st.teamB = e.target.value; save(); render(); });
document.getElementById('targetInput')?.addEventListener('change', e => { st.target = Number(e.target.value); save(); render(); });

document.getElementById('addDealBtn').addEventListener('click', () => {
  st.deals.push(emptyDeal());
  save();
  render();
  window.scrollTo(0, document.body.scrollHeight);
});

document.getElementById('unlockBtn').addEventListener('click', async () => {
  await WriteMode.toggle();
  render();
});

// upis je dopušten otključanim stolovima ili adminu
function canWrite() {
  return WriteMode.on() || (window.ViewMode && ViewMode.full());
}

function dealCard(d, idx) {
  const card = document.createElement('div');
  card.className = 'card';

  const head = document.createElement('div');
  head.className = 'deal-head';
  head.innerHTML = '<h3>' + (idx + 1) + '. dijeljenje</h3>';
  const del = document.createElement('button');
  del.className = 'del'; del.textContent = '✕';
  del.title = 'Obriši dijeljenje';
  del.addEventListener('click', () => {
    if (st.deals.length === 1) { st.deals[0] = emptyDeal(); }
    else st.deals.splice(idx, 1);
    save(); render();
  });
  head.appendChild(del);
  card.appendChild(head);

  // zvao adut
  card.appendChild(pillField('Zvao aduta', ['caller'], [
    { lbl: st.teamA, val: 0 }, { lbl: st.teamB, val: 1 }
  ], d.caller, v => { d.caller = (d.caller === v ? null : v); save(); render(); }));

  // štih bodovi
  const stih = document.createElement('div');
  stih.className = 'field';
  stih.innerHTML = '<label>Bodovi iz štihova (zbroj 162)</label>';
  const two = document.createElement('div'); two.className = 'two';
  const a = numInput(d.trick0, v => { d.trick0 = v; if (d.kapot === null) d.trick1 = comp(v); save(); render(); });
  const b = numInput(d.trick1, v => { d.trick1 = v; if (d.kapot === null) d.trick0 = comp(v); save(); render(); });
  const sep = document.createElement('div'); sep.className = 'sep'; sep.textContent = ':';
  two.append(a, sep, b);
  stih.appendChild(two);
  card.appendChild(stih);

  // zvanja — tipke (može više, vezana zvanja se zbrajaju)
  if (!Array.isArray(d.zv0)) d.zv0 = d.zvanja0 ? [Number(d.zvanja0)] : [];
  if (!Array.isArray(d.zv1)) d.zv1 = d.zvanja1 ? [Number(d.zvanja1)] : [];
  const zv = document.createElement('div');
  zv.className = 'field';
  zv.innerHTML = '<label>Zvanja (terca 20 · kvarta 50 · kvinta 100 · 4×9 150 · 4×J 200 · može više)</label>';
  const zgrid = document.createElement('div'); zgrid.className = 'zv-grid';
  zgrid.appendChild(zvanjaTeam(st.teamA, d.zv0, () => { d.zvanja0 = sum(d.zv0); save(); render(); }));
  zgrid.appendChild(zvanjaTeam(st.teamB, d.zv1, () => { d.zvanja1 = sum(d.zv1); save(); render(); }));
  zv.appendChild(zgrid);
  card.appendChild(zv);

  // bela
  const belaField = document.createElement('div');
  belaField.className = 'field';
  belaField.innerHTML = '<label>Bela (kralj + dama aduta · 20)</label>';
  const bp = document.createElement('div'); bp.className = 'pills';
  bp.appendChild(togglePill(st.teamA, d.bela0, on => { d.bela0 = on; save(); render(); }));
  bp.appendChild(togglePill(st.teamB, d.bela1, on => { d.bela1 = on; save(); render(); }));
  belaField.appendChild(bp);
  card.appendChild(belaField);

  // kapot
  card.appendChild(pillField('Kapot (sve štihove)', ['kapot'], [
    { lbl: '—', val: null }, { lbl: st.teamA, val: 0 }, { lbl: st.teamB, val: 1 }
  ], d.kapot, v => { d.kapot = v; if (v !== null) { d.trick0 = ''; d.trick1 = ''; } save(); render(); }));

  // rezultat dijeljenja
  const res = document.createElement('div');
  const [s0, s1] = Bela.scoreDeal(normDeal(d));
  if (validDeal(d)) {
    res.className = 'deal-result';
    res.textContent = st.teamA + ' ' + s0 + ' : ' + s1 + ' ' + st.teamB;
  } else {
    res.className = 'deal-result warn';
    res.textContent = 'Označi tko je zvao i upiši bodove (zbroj štihova 162).';
  }
  card.appendChild(res);
  return card;
}

function comp(v) {
  if (v === '' || v === null) return '';
  const n = Math.max(0, Math.min(162, Number(v) || 0));
  return String(162 - n);
}
function normDeal(d) {
  const z0 = Array.isArray(d.zv0) ? sum(d.zv0) : (Number(d.zvanja0) || 0);
  const z1 = Array.isArray(d.zv1) ? sum(d.zv1) : (Number(d.zvanja1) || 0);
  return { caller: d.caller, trick0: Number(d.trick0) || 0, trick1: Number(d.trick1) || 0,
    zvanja0: z0, zvanja1: z1, zvanjaWinner: d.zvanjaWinner,
    bela0: d.bela0, bela1: d.bela1, kapot: d.kapot };
}
function validDeal(d) {
  if (d.caller === null) return false;
  if (d.kapot !== null) return true;
  const a = Number(d.trick0), b = Number(d.trick1);
  if (d.trick0 === '' && d.trick1 === '') return false;
  return (a + b) === 162;
}

function pillField(labelText, _path, opts, current, onPick) {
  const f = document.createElement('div');
  f.className = 'field';
  f.innerHTML = '<label>' + labelText + '</label>';
  const pills = document.createElement('div');
  pills.className = 'pills';
  opts.forEach(o => {
    const p = document.createElement('button');
    p.className = 'pill' + (current === o.val ? ' on' : '');
    p.textContent = o.lbl;
    p.addEventListener('click', () => onPick(o.val));
    pills.appendChild(p);
  });
  f.appendChild(pills);
  return f;
}
function togglePill(lbl, on, onChange) {
  const p = document.createElement('button');
  p.className = 'pill' + (on ? ' on' : '');
  p.textContent = lbl;
  p.addEventListener('click', () => onChange(!on));
  return p;
}
function numInput(val, onChange) {
  const i = document.createElement('input');
  i.type = 'number'; i.min = 0; i.placeholder = '0';
  i.value = (val === '' || val === null || val === undefined) ? '' : val;
  i.addEventListener('change', () => onChange(i.value));
  return i;
}

const ZVANJA = [20, 50, 100, 150, 200];
function sum(arr) { return (arr || []).reduce((a, b) => a + Number(b), 0); }

// Kontrola zvanja jedne ekipe: tipke za dodavanje + uklonjivi čipovi + zbroj.
function zvanjaTeam(name, list, onChange) {
  const col = document.createElement('div');
  col.className = 'zv-col';

  const nm = document.createElement('div');
  nm.className = 'zv-name';
  nm.textContent = name;
  col.appendChild(nm);

  const btns = document.createElement('div');
  btns.className = 'zv-btns';
  ZVANJA.forEach(val => {
    const b = document.createElement('button');
    b.className = 'zv-add';
    b.textContent = '+' + val;
    b.addEventListener('click', () => { list.push(val); onChange(); });
    btns.appendChild(b);
  });
  col.appendChild(btns);

  const chips = document.createElement('div');
  chips.className = 'zv-chips';
  list.forEach((v, idx) => {
    const c = document.createElement('button');
    c.className = 'zv-chip';
    c.innerHTML = v + ' <span>✕</span>';
    c.title = 'Ukloni zvanje';
    c.addEventListener('click', () => { list.splice(idx, 1); onChange(); });
    chips.appendChild(c);
  });
  if (list.length) {
    const tot = document.createElement('span');
    tot.className = 'zv-total';
    tot.textContent = '= ' + sum(list);
    chips.appendChild(tot);
  }
  col.appendChild(chips);
  return col;
}

function render() {
  // scoreboard
  document.getElementById('sbNameA').textContent = st.teamA;
  document.getElementById('sbNameB').textContent = st.teamB;
  document.getElementById('targetNote').textContent = 'do ' + st.target;

  const g = Bela.scoreGame(st.deals.filter(validDeal).map(normDeal), st.target);
  document.getElementById('sbPtsA').textContent = g.total0;
  document.getElementById('sbPtsB').textContent = g.total1;
  document.getElementById('sbPtsA').className = 'pts' + (g.total0 > g.total1 ? ' lead' : '');
  document.getElementById('sbPtsB').className = 'pts' + (g.total1 > g.total0 ? ' lead' : '');

  const banner = document.getElementById('winnerBanner');
  if (g.finished && g.winner !== null) {
    banner.style.display = '';
    banner.textContent = '🏆 ' + (g.winner === 0 ? st.teamA : st.teamB) + ' dobiva partiju!';
  } else {
    banner.style.display = 'none';
  }

  // dijeljenja
  const wrap = document.getElementById('deals');
  wrap.innerHTML = '';
  st.deals.forEach((d, i) => wrap.appendChild(dealCard(d, i)));

  // auto-upis u turnir kad je partija gotova
  maybeWrite(g);
  applyAccess();
}

function setReadonly(ro) {
  const main = document.querySelector('main');
  main.querySelectorAll('input').forEach(i => { i.readOnly = ro; });
  main.querySelectorAll('select').forEach(s => { s.disabled = ro; });
  main.querySelectorAll('.del').forEach(d => { d.style.display = ro ? 'none' : ''; });
  main.querySelectorAll('.zv-add, .zv-chip, .pill').forEach(p => {
    p.style.pointerEvents = ro ? 'none' : '';
    p.style.opacity = ro ? '0.6' : '';
  });
}

// Pristup brojaču: zaključano kolo (samo organizator), zaštita upisa kodom, ili otvoreno.
function applyAccess() {
  const addBtn = document.getElementById('addDealBtn');
  const unlockBtn = document.getElementById('unlockBtn');
  const status = document.getElementById('syncStatus');

  if (roundLocked) {  // igra se neko kasnije kolo
    setReadonly(true);
    addBtn.style.display = 'none';
    unlockBtn.style.display = 'none';
    status.className = 'sync-status';
    status.textContent = '🔒 Ovo kolo je zaključano. Za ispravak se javi organizatoru.';
    return;
  }
  if (linked && !canWrite()) {  // treba kod za upis
    setReadonly(true);
    addBtn.style.display = 'none';
    unlockBtn.style.display = '';
    status.className = 'sync-status';
    status.textContent = '🔒 Upis je zaključan — dodirni „Otključaj za upis" i unesi kod stola.';
    return;
  }
  setReadonly(false);
  addBtn.style.display = '';
  unlockBtn.style.display = 'none';
}

function maybeWrite(g) {
  const status = document.getElementById('syncStatus');
  if (linked && (roundLocked || !canWrite())) return;  // zaključano / nije otključan upis (poruku postavlja applyAccess)
  if (!linked) {
    if (g.finished) {
      status.className = 'sync-status ok';
      status.textContent = 'Rezultat: ' + g.total0 + ' : ' + g.total1 +
        ' — upiši ga ručno u turnir (nije povezano).';
    } else { status.textContent = ''; }
    return;
  }
  // ne upisuj prazno (0:0) dok partija ne krene
  if (!g.finished && g.total0 === 0 && g.total1 === 0) {
    status.textContent = 'Povezano s turnirom — rezultat se prikazuje uživo čim krene.';
    return;
  }
  const sig = g.total0 + ':' + g.total1 + ':' + (g.finished ? 'F' : 'L');
  const okText = g.finished
    ? '✓ Upisano u turnir (' + g.total0 + ':' + g.total1 + ')'
    : '⏳ Uživo u turniru: ' + g.total0 + ' : ' + g.total1;
  if (sig === lastWritten) { status.className = 'sync-status ok'; status.textContent = okText; return; }
  BelaSync.setMatch(TURNIR, Number(KOLO), Number(STOL), g.total0, g.total1, g.finished).then(ok => {
    if (ok) { lastWritten = sig; status.className = 'sync-status ok'; status.textContent = okText; }
    else { status.textContent = 'Upis nije uspio — provjeri vezu.'; }
  });
}

setupHeaderFromTournament();
render();
</script>
</body>
</html>
